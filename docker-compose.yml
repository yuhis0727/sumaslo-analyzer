services:
  api:
    build: ./docker/dev
    command: python -m uvicorn src.main:app --reload --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ./backend/.flake8:/workspace/.flake8
      - ./backend/.env:/workspace/.env
      - ./backend/alembic.ini.dev:/workspace/alembic.ini
      - ./backend/alembic:/workspace/alembic:consistent
      - ./backend/src/:/workspace/src:consistent
      - ./backend/tests/:/workspace/tests:consistent
      - ./backend/pyproject.toml:/workspace/pyproject.toml
      - ./docker/scripts/:/workspace/scripts
      - ./minrepo_maruhan_kamata7_browser.csv:/workspace/data/machines.csv:ro
  db:
    image: postgres:15
    volumes:
      - db-store:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=sumaslo
      - POSTGRES_USER=db-user
      - POSTGRES_PASSWORD=db-pass
      - TZ=Asia/Tokyo
    ports:
      - 15432:5432

  web:
    image: node:20.17.0
    working_dir: /app
    volumes:
      - ./frontend:/app:consistent
      - node_modules:/app/node_modules
    command: sh -c "yarn install && yarn dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - TZ=Asia/Tokyo
      - NEXT_PUBLIC_API_URL=http://localhost:8080
  nginx:
    image: nginx:latest
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:consistent
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
      - api
    environment:
      - NODE_ENV=development
volumes:
  db-store:
    driver: local
  node_modules: