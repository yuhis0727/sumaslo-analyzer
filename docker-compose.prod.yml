services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Tokyo
      - MACHINES_CSV=/workspace/machines.csv
    volumes:
      - ./backend/data:/workspace/data:consistent
      - ./minrepo_maruhan_kamata7_browser.csv:/workspace/machines.csv:ro
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_FAVICON_PATH: ${NEXT_PUBLIC_FAVICON_PATH:-}
    environment:
      - NODE_ENV=production
      - TZ=Asia/Tokyo
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:consistent
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
      - api
    restart: unless-stopped
