services:
  api:
    build: ./docker/dev
    command: python -m uvicorn src.main:app --reload --host 0.0.0.0 --port 8080
    environment:
      - TZ=Asia/Tokyo
    volumes:
      - ./backend/.flake8:/workspace/.flake8
      - ./backend/.env:/workspace/.env
      - ./backend/src/:/workspace/src:consistent
      - ./backend/tests/:/workspace/tests:consistent
      - ./docker/scripts/:/workspace/scripts

  web:
    image: node:20.17.0
    working_dir: /app
    volumes:
      - ./frontend:/app:consistent
      - node_modules:/app/node_modules
    command: sh -c "yarn install && yarn dev"
    environment:
      - NODE_ENV=development
      - TZ=Asia/Tokyo
  nginx:
    image: nginx:latest
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:consistent
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
      - api
    environment:
      - NODE_ENV=development
volumes:
  node_modules:
